services:
  - type: web
    name: ugc-monitor-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APIFY_API_TOKEN
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: NAVER_API_URL
        sync: false
      - key: NAVER_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_PATH
        value: /etc/secrets/google_credentials.json
